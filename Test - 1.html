<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello AI-Native Developers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #2563eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    h1 {
      color: white;
      font-size: 2rem;
      text-align: center;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background-color: white;
      color: #2563eb;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background-color: #f0f4ff;
    }
  </style>
</head>
<body>
  <h1>Hello AI-Native Developers</h1>
  <button onclick="alert('Hello from the button!')">Click Me</button>
</body>
</html>
