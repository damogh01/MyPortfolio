<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello AI-Native Developers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-family: system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1920&q=80");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(15, 23, 42, 0.72),
        rgba(30, 41, 59, 0.82)
      );
      z-index: -1;
    }

    .content-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      padding: 2.5rem 3rem;
      border-radius: 1rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
      max-width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    h1 {
      color: #0f172a;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }

    button {
      padding: 0.85rem 1.75rem;
      font-size: 1rem;
      background-color: #0891b2;
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.2s;
    }

    button:hover {
      background-color: #0e7490;
      transform: scale(1.03);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="content-card">
    <h1>Hello AI-Native Developers</h1>
    <button onclick="alert('Hello, I am Amogh Raghavendra Deshpande')">Click Me</button>
  </div>
</body>
</html>
